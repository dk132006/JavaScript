<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="input">
            <input class="userInput" type="text" readonly>
            
        </div>
        <div class="operations">
            <button onclick = "backspace()" class="ers" id="bksp"><=</button>
            <button onclick="clearAll()" class="ers" id="ac">AC</button>
            <button onclick="appendToDisplay('%')" class="ers" id="mod">%</button>
            <button onclick="appendToDisplay('/')" class="ers" id="div">/</button>
            <button onclick="appendToDisplay('7')" class="num" id="7">7</button>
            <button onclick="appendToDisplay('8')" class="num" id="8">8</button>
            <button onclick="appendToDisplay('9')" class="num" id="9">9</button>
            <button onclick="appendToDisplay('*')" class = "oper" id="x">x</button>
            <button onclick="appendToDisplay('4')" class="num" id="4">4</button>
            <button onclick="appendToDisplay('5')" class="num" id="5">5</button>
            <button onclick="appendToDisplay('6')" class="num" id="6">6</button>
            <button onclick="appendToDisplay('-')" class = "oper" id="-">-</button>
            <button onclick="appendToDisplay('1')" class="num" id="1">1</button>
            <button onclick="appendToDisplay('2')" class="num" id="2">2</button>
            <button onclick="appendToDisplay('3')" class="num" id="3">3</button>
            <button onclick="appendToDisplay('+')" class = "oper" id="+">+</button>
            <button onclick="changesign()" class="num" id="+/-">+/-</button>
            <button onclick="appendToDisplay('0')" class="num" id="0">0</button>
            <button onclick="appendToDisplay('.')"class="num" id=".">. </button>
            <button onclick="calculate()" class = "oper" id="=">=</button>
        </div>
        <script src="app.js"></script>
    </body>
</html>
